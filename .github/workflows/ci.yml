name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build admin web
        run: npm run build:admin:web
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_build

      - name: Build client web
        run: npm run build:client:web
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_for_ci_build

  converter-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Converter typecheck/tests run in the main job via turbo; this job
      # proves the deployable image still builds (LibreOffice + poppler).
      - name: Build converter image
        run: docker build -f services/converter/Dockerfile .
