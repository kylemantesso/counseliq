name: Main deploy (production)

# On every push to main (or manual run): first VERIFY the code builds, then
# per platform automatically choose the cheapest correct path:
#   - fingerprint UNCHANGED (a production binary already exists) -> publish an
#     instant OTA update to the `production` channel. Users get it on next launch.
#   - fingerprint CHANGED (no matching binary) -> run a fresh native build and
#     submit it to the App Store / Play production track.
#
# Marketing version (expo.version) is bumped separately and intentionally by the
# Release workflow only when a binary ships; build numbers / versionCode are
# auto-incremented by EAS. Use the `force_native_build` manual input to force a
# fresh store binary even when the native layer is unchanged (e.g. a marketing
# version bump with no native change).

on:
  push:
    branches:
      - main
    paths:
      - apps/client-mobile/**
      - packages/**
      - "!**/*.md"
  workflow_dispatch:
    inputs:
      force_native_build:
        description: Force a fresh native build + store submit (ignore existing binary)
        type: boolean
        default: false

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

jobs:
  verify:
    name: Verify (typecheck + JS bundle)
    environment: production
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Typecheck (shared packages)
        run: |
          cd "$(git rev-parse --show-toplevel)"
          npm run typecheck
      - name: Verify marketing version alignment
        run: |
          cd "$(git rev-parse --show-toplevel)"
          APP_VERSION=$(node -p "require('./apps/client-mobile/app.json').expo.version")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$APP_VERSION" != "$PKG_VERSION" ]; then
            echo "Version mismatch: app.json=$APP_VERSION package.json=$PKG_VERSION"
            echo "Run: node scripts/bump-version.mjs <patch|minor|major>"
            exit 1
          fi
      - name: Export mobile JS bundle
        run: |
          cd "$(git rev-parse --show-toplevel)/apps/client-mobile"
          # Only bundle the native platforms this workflow ships (iOS + Android).
          # Web is served by apps/client-web (Next.js); exporting the mobile static web
          # target here adds no value and fails in the EAS sandbox because Metro
          # cannot compute the SHA-1 of NativeWind's react-native-css-interop
          # .cache/web.css file generated during static rendering.
          npx expo export --platform ios --platform android

  fingerprint:
    name: Fingerprint native layer
    needs: [verify]
    type: fingerprint
    environment: production

  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      profile: production
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}

  get_android_build:
    name: Check for existing Android build
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      profile: production
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}

  build_ios:
    name: Build iOS (native changed)
    needs: [get_ios_build]
    if: ${{ github.event.inputs.force_native_build == 'true' || !needs.get_ios_build.outputs.build_id }}
    type: build
    environment: production
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android (native changed)
    needs: [get_android_build]
    if: ${{ github.event.inputs.force_native_build == 'true' || !needs.get_android_build.outputs.build_id }}
    type: build
    environment: production
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit iOS to App Store
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  submit_android:
    name: Submit Android to Play (production)
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  publish_ios_update:
    name: Publish iOS OTA to production
    needs: [get_ios_build]
    if: ${{ github.event.inputs.force_native_build != 'true' && needs.get_ios_build.outputs.build_id }}
    type: update
    environment: production
    params:
      channel: production
      platform: ios
      message: ${{ github.event.head_commit.message }}

  publish_android_update:
    name: Publish Android OTA to production
    needs: [get_android_build]
    if: ${{ github.event.inputs.force_native_build != 'true' && needs.get_android_build.outputs.build_id }}
    type: update
    environment: production
    params:
      channel: production
      platform: android
      message: ${{ github.event.head_commit.message }}
