  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\">\n                <span style=\"font-size:17px;font-weight:700;letter-spacing:-.01em\">Unit 2.3 — Mandatory reporting duties<\u002Fspan>\n                <span style=\"font-size:12.5px;color:#71706A\">Narration 7 min · 4 static cards · 2 questions<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:#55544E;background:#FFFFFF;border:1px solid #D8D5CB;border-radius:999px;padding:7px 14px\"><span style=\"width:26px;height:15px;border-radius:999px;background:#ECEAE2;position:relative;display:inline-block\"><span style=\"position:absolute;left:2px;top:2px;width:11px;height:11px;border-radius:50%;background:#FFFFFF;border:1px solid #D8D5CB;box-sizing:border-box\"><\u002Fspan><\u002Fspan>Mark for send-back<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:12px;background:#F9E8E5;border:1px solid #EFD2CC;border-radius:12px;padding:14px 18px\">\n              <span style=\"width:18px;height:18px;border-radius:50%;background:#B3362B;color:#FFFFFF;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:0 0 auto;margin-top:1px\">✕<\u002Fspan>\n              <div style=\"flex:1;display:flex;flex-direction:column;gap:2px\">\n                <span style=\"font-size:13.5px;font-weight:700;color:#B3362B\">Question 2 has two defensibly correct answers<\u002Fspan>\n                <span style=\"font-size:12.5px;color:#B3362B\">Options B and D both satisfy the reporting threshold as narrated. Blocks gate approval.<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"display:inline-flex;align-items:center;background:#1F1E1B;color:#FFFFFF;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;flex:0 0 auto\">Regenerate question<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;background:#FFFFFF;color:#1B1B18;border:1px solid #D8D5CB;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;flex:0 0 auto\">Edit manually<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E5E3DA;border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;gap:12px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8A877C;font-weight:600\">Narration · sentence classification<\u002Fspan>\n                <div style=\"display:flex;gap:12px;font-size:11.5px;color:#71706A\">\n                  <span style=\"display:inline-flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#E5F1E8;border:1px solid #CBE3D2\"><\u002Fspan>Sourced fact<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#E9EEF6;border:1px solid #CFDCEE\"><\u002Fspan>Instruction<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:5px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#F5ECD8;border:1px solid #EBDDBB\"><\u002Fspan>Unverified<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.75;color:#1B1B18;text-wrap:pretty\"><span style=\"background:#E9EEF6;border-radius:4px;padding:1px 3px\">In this unit you will work through the situations where you must report, even against a client's wishes.<\u002Fspan> <span style=\"background:#E5F1E8;border-radius:4px;padding:1px 3px\">Every Australian state and territory requires reporting of suspected child abuse, though the professions covered differ by jurisdiction.<\u002Fspan> <span style=\"background:#E5F1E8;border-radius:4px;padding:1px 3px\">In Victoria, the failure-to-disclose offence applies to all adults, not only professionals.<\u002Fspan> <span style=\"background:#F5ECD8;border-radius:4px;padding:1px 3px\">Most counsellors will face a mandatory reporting decision within their first two years of practice.<\u002Fspan> <span style=\"background:#E9EEF6;border-radius:4px;padding:1px 3px\">Pause here and consider how you would open that conversation with your client.<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:stretch\">\n              <div style=\"flex:1;background:#FFFFFF;border:1px solid #E5E3DA;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;gap:12px\">\n                <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8A877C;font-weight:600\">Static cards · 4<\u002Fspan>\n                <div style=\"display:flex;gap:12px\">\n                  <div style=\"width:86px;height:152px;border-radius:12px;background:#0E1B2C;color:#F6F1E7;padding:10px;box-sizing:border-box;display:flex;flex-direction:column\"><span style=\"font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:#C9A227\">Module 2<\u002Fspan><span style=\"font-size:9px;font-weight:700;margin-top:6px;line-height:1.3\">Mandatory reporting duties<\u002Fspan><span style=\"flex:1\"><\u002Fspan><span style=\"font-size:6px;opacity:.6\">01 / 04<\u002Fspan><\u002Fdiv>\n                  <div style=\"width:86px;height:152px;border-radius:12px;background:#0E1B2C;color:#F6F1E7;padding:10px;box-sizing:border-box;display:flex;flex-direction:column\"><span style=\"font-size:6px;letter-spacing:.14em;text-transform:uppercase;opacity:.6\">Key duty<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#C9A227;margin-top:10px\">Report<\u002Fspan><span style=\"font-size:8px;margin-top:4px;line-height:1.35;opacity:.85\">suspected child abuse in every state and territory<\u002Fspan><span style=\"flex:1\"><\u002Fspan><span style=\"font-size:6px;opacity:.6\">02 / 04<\u002Fspan><\u002Fdiv>\n                  <div style=\"width:86px;height:152px;border-radius:12px;background:#0E1B2C;color:#F6F1E7;padding:10px;box-sizing:border-box;display:flex;flex-direction:column\"><span style=\"font-size:6px;letter-spacing:.14em;text-transform:uppercase;opacity:.6\">Victoria<\u002Fspan><span style=\"font-size:9px;font-weight:700;margin-top:6px;line-height:1.3\">Failure to disclose applies to all adults<\u002Fspan><span style=\"flex:1\"><\u002Fspan><span style=\"font-size:6px;opacity:.6\">03 / 04<\u002Fspan><\u002Fdiv>\n                  <div style=\"width:86px;height:152px;border-radius:12px;border:1.5px dashed #C9C6BA;box-sizing:border-box;display:flex;align-items:center;justify-content:center;font-size:10px;color:#8A877C;text-align:center;padding:8px\">Anchor preview<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;background:#FFFFFF;border:1px solid #E5E3DA;border-radius:14px;padding:18px 22px;display:flex;flex-direction:column;gap:10px\">\n                <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8A877C;font-weight:600\">Question 2 · flagged<\u002Fspan>\n                <span style=\"font-size:13.5px;font-weight:600;text-wrap:pretty\">A client discloses historical abuse of a now-adult sibling. What is your duty in Victoria?<\u002Fspan>\n                <div style=\"display:flex;flex-direction:column;gap:6px;font-size:12.5px\">\n                  <span style=\"border:1px solid #E0DDD3;border-radius:9px;padding:7px 12px\">A — No duty; the victim is now an adult<\u002Fspan>\n                  <span style=\"border:1px solid #EFD2CC;background:#FDF6F5;border-radius:9px;padding:7px 12px;font-weight:600\">B — Report if a child may currently be at risk ✕<\u002Fspan>\n                  <span style=\"border:1px solid #E0DDD3;border-radius:9px;padding:7px 12px\">C — Report only with client consent<\u002Fspan>\n                  <span style=\"border:1px solid #EFD2CC;background:#FDF6F5;border-radius:9px;padding:7px 12px;font-weight:600\">D — Assess ongoing risk, then report ✕<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 1h GATE 3 ============ -->\n  <div id=\"1h\" style=\"display:flex;flex-direction:column;gap:14px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px\">\n      <a href=\"#1h\" style=\"text-decoration:none\"><span style=\"background:#1F1E1B;color:#FFFFFF;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700\">1h<\u002Fspan><\u002Fa>\n      <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#55544E\">/admin/runs/[id]/gate-3 — Preview &amp; publish<\u002Fspan>\n      <span style=\"font-size:12px;color:#8A877C\">Blocked-unit state (flip the \"gate3Ready\" tweak for ready-to-publish)<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"width:1440px;min-height:900px;box-sizing:border-box;display:flex;align-items:stretch;border-radius:18px;border:1px solid #DDDACF;background:#F3F2ED;overflow:hidden;box-shadow:0 24px 48px rgba(30,28,20,.08)\">\n      <div style=\"flex:0 0 230px;display:flex;align-items:stretch\">\n<div style=\"width:230px;min-height:100%;box-sizing:border-box;display:flex;flex-direction:column;padding:20px 14px 18px;border-right:1px solid #E5E3DA;background:#F3F2ED;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#1B1B18\">\n  <div style=\"display:flex;align-items:center;gap:10px;padding:0 12px 6px\">\n    <span style=\"width:28px;height:28px;border-radius:50%;background:#1F1E1B;color:#FFFFFF;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">C<\u002Fspan>\n    <span style=\"font-size:15px;font-weight:700;letter-spacing:-.01em\">CounselIQ<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A978C;font-weight:600;padding:18px 12px 8px\">Workspace<\u002Fdiv>\n  \n  \n    <div style=\"display:flex;align-items:center;padding:8px 12px;border-radius:999px;color:#55544E;font-size:13px;font-weight:500\">Home<\u002Fdiv>\n  \n\n  <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A978C;font-weight:600;padding:18px 12px 8px\">Libraries<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:2px\">\n    <div style=\"display:flex;align-items:center;padding:8px 12px;border-radius:999px;color:#55544E;font-size:13px;font-weight:500\">Source documents<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;padding:8px 12px;border-radius:999px;color:#55544E;font-size:13px;font-weight:500\">Assets &amp; rights<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A978C;font-weight:600;padding:18px 12px 8px\">Runs<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:2px\">\n    \n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:999px;background:#1F1E1B;color:#FFFFFF;font-size:13px;font-weight:600\"><span>All runs<\u002Fspan><span style=\"background:rgba(255,255,255,.22);border-radius:999px;padding:1px 8px;font-size:11px\">3<\u002Fspan><\u002Fdiv>\n    \n    \n    \n    \n      <div style=\"display:flex;align-items:center;padding:8px 12px;border-radius:999px;color:#55544E;font-size:13px;font-weight:500\">Create course<\u002Fdiv>\n    \n  <\u002Fdiv>\n\n  <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A978C;font-weight:600;padding:18px 12px 8px\">Operations<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:2px\">\n    <div style=\"display:flex;align-items:center;padding:8px 12px;border-radius:999px;color:#55544E;font-size:13px;font-weight:500\">Delivery log<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;padding:8px 12px;border-radius:999px;color:#55544E;font-size:13px;font-weight:500\">Diagnostics<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1\"><\u002Fdiv>\n\n  <div style=\"background:#FFFFFF;border:1px solid #E5E3DA;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <span style=\"width:30px;height:30px;border-radius:8px;background:#1F1E1B;color:#FFFFFF;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700\">LT<\u002Fspan>\n      <div style=\"display:flex;flex-direction:column\">\n        <span style=\"font-size:12.5px;font-weight:600;line-height:1.2\">La Trobe University<\u002Fspan>\n        <span style=\"font-size:11px;color:#8A877C\">Ready for generation<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:12px;font-weight:600;color:#55544E;border-top:1px solid #EEECE4;padding-top:8px\">Switch institution<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 32px;border-bottom:1px solid #E5E3DA\">\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:13px;color:#71706A\">\n            <span style=\"display:inline-flex;align-items:center;gap:8px;background:#FFFFFF;border:1px solid #E0DDD3;border-radius:999px;padding:6px 12px;color:#1B1B18;font-weight:600\"><span style=\"width:8px;height:8px;border-radius:50%;background:#1F1E1B\"><\u002Fspan>La Trobe University<\u002Fspan>\n            <span>/<\u002Fspan><span>Counselling for Australia<\u002Fspan><span>/<\u002Fspan><span style=\"color:#1B1B18;font-weight:600\">Gate 3<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"width:32px;height:32px;border-radius:50%;background:#1F1E1B;color:#FFFFFF;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600\">KM<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 32px\">\n          <div style=\"display:flex;flex-direction:column;gap:4px\">\n            <h1 style=\"margin:0;font-size:24px;font-weight:700;letter-spacing:-.02em\">Gate 3 — Preview &amp; publish<\u002Fh1>\n            <span style=\"font-size:13px;color:#71706A\">Final runtime-quality check. What learners get is exactly what plays here.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:center\">\n            <span style=\"display:inline-flex;align-items:center;background:#FFFFFF;color:#1B1B18;border:1px solid #D8D5CB;border-radius:999px;padding:9px 18px;font-size:13px;font-weight:600\">Reject to Gate 2 with notes<\u002Fspan>\n            \n              <span style=\"display:inline-flex;align-items:center;background:#1F1E1B;color:#FFFFFF;border-radius:999px;padding:9px 18px;font-size:13px;font-weight:600;opacity:.4\">Approve &amp; publish<\u002Fspan>\n            \n            \n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;padding:0 32px\">\n          \n            <div style=\"display:flex;align-items:center;gap:12px;background:#F9E8E5;border:1px solid #EFD2CC;border-radius:12px;padding:14px 18px\">\n              <span style=\"width:18px;height:18px;border-radius:50%;background:#B3362B;color:#FFFFFF;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:0 0 auto\">✕<\u002Fspan>\n              <span style=\"flex:1;font-size:13px;color:#B3362B\"><b>Unit 3.2 failed narration synthesis.<\u002Fb> Publish is locked until every unit synthesises cleanly or is sent back.<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;background:#1F1E1B;color:#FFFFFF;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600\">Retry synthesis<\u002Fspan>\n
